services:
  backend:
    build: ./backend
    container_name: chat_backend
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=file:./data.db
    depends_on:
      - redis

  frontend:
    build: ./frontend
    container_name: chat_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  redis:
    image: redis:7
    container_name: chat_redis
    ports:
      - "6379:6379"

  nginx:
    image: nginx:latest
    container_name: chat_nginx
    ports:
      - "18080:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend
